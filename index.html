{id:'auth-api',l:'Auth API',cat:'backend',sz:5,rel:1,cl:'Go',
 desc:'Phone OTP + Apple/Google SSO auth endpoints. POST /auth/send-code issues SMS via Ory self-service. POST /auth/verify-code returns RS256 JWT + refresh token. POST /auth/sso/apple and /auth/sso/google handle SIWA/Google tokens. POST /auth/logout invalidates Ory session. POST /auth/preferences saves onboarding answers. RATE_LIMIT_AUTH=5 req/min per IP enforced.',
 code:`<span class="cc">// auth_flow_handler.go (app.go lines 432-438)</span>
POST /api/v1/auth/send-code       <span class="cc">// SMS OTP → Ory</span>
POST /api/v1/auth/verify-code     <span class="cc">// → RS256 JWT</span>
POST /api/v1/auth/sso/apple       <span class="cc">// SIWA token</span>
POST /api/v1/auth/sso/google      <span class="cc">// Google OAuth</span>
POST /api/v1/auth/logout          <span class="cc">// revoke session</span>
POST /api/v1/auth/refresh         <span class="cc">// rotate JWT</span>
POST /api/v1/auth/token-exchange  <span class="cc">// Ory↔JWT swap</span>
POST /api/v1/auth/preferences     <span class="cc">// onboarding prefs</span>
POST /api/v1/users/me/agreements  <span class="cc">// T&amp;C accept</span>`,
 conn:['ory','profile-api','jwt-middleware','ios-app','onboarding'],
 guide:`<div class="gs"><div class="gt">Add new auth method</div><div class="gsteps"><div class="gstep"><span class="gsn">1</span><span class="gst">Add handler in <code>auth_flow_handler.go</code></span></div><div class="gstep"><span class="gsn">2</span><span class="gst">Register route in <code>app.go</code> (no JWT middleware — pre-auth)</span></div><div class="gstep warn"><span class="gsn">!</span><span class="gst">Rate limiter enforces 5 req/min per IP — new endpoints inherit this</span></div></div></div>`},

{id:'jwt-middleware',l:'JWT + Rate Limiter',cat:'backend',sz:4,rel:1,cl:'Go',
 desc:'RS256 JWT validation middleware protecting all /my/* routes. RequireAuth() validates Bearer token signed with JWT_RSA_PRIVATE_KEY. OptionalAuth() attaches user if present. Party mode uses separate HS256 symmetric guest tokens (PARTY_JWT_SECRET) via PartyOrGuestAuthMiddleware. Three-tier rate limiter: auth=5, write=30, read=100 req/min per IP via RATE_LIMIT_* env vars.',
 code:`<span class="cc">// middleware/jwt_auth.go</span>
<span class="ck">func</span> RequireAuth() echo.MiddlewareFunc
<span class="ck">func</span> OptionalAuth() echo.MiddlewareFunc

<span class="cc">// party: RS256 host OR HS256 guest</span>
<span class="ck">func</span> PartyOrGuestAuthMiddleware() echo.MiddlewareFunc

<span class="cc">// Rate limits (req/min per IP)</span>
auth:  5   <span class="cc">// RATE_LIMIT_AUTH</span>
write: 30  <span class="cc">// RATE_LIMIT_WRITE</span>
read:  100 <span class="cc">// RATE_LIMIT_READ</span>`,
 conn:['ory','defteros','auth-api','party-api'],
 guide:`<div class="gs"><div class="gt">Debug JWT validation failure</div><div class="gsteps"><div class="gstep"><span class="gsn">1</span><span class="gst">Ensure token is RS256 Bearer — not raw Ory session token</span></div><div class="gstep warn"><span class="gsn">!</span><span class="gst">Party routes use HS256 (PARTY_JWT_SECRET) — <code>PartyOrGuestAuthMiddleware</code> handles both</span></div><div class="gstep"><span class="gsn">3</span><span class="gst">OptionalAuth() silently passes — use RequireAuth() where JWT is mandatory</span></div></div></div>`},

{id:'delta-sync',l:'Delta Sync Cache',cat:'backend',sz:5,rel:1,cl:'Go',
 desc:'Incremental data sync — clients send timestamp, receive only records updated since. All endpoints use ?timestamp={unix} param (not ?ts=). Registered routes: GET /cache/recipes?timestamp=, /cache/mixlists?timestamp=, /cache/profile, /cache/devices, /cache/stations, /cache/craft-sessions, /cache/reviews. cache_handler.go + cache_service.go. iOS stores per-resource timestamps in UserDefaults. Eliminates full-refetch on every app open.',
 code:`<span class="cc">// cache_handler.go — ALL use ?timestamp=</span>
GET /api/v1/cache/recipes?timestamp=&lt;unix&gt;
GET /api/v1/cache/mixlists?timestamp=&lt;unix&gt;
GET /api/v1/cache/profile
GET /api/v1/cache/devices
GET /api/v1/cache/stations
GET /api/v1/cache/craft-sessions
GET /api/v1/cache/reviews

<span class="cc">// iOS: store last-sync per resource</span>
UserDefaults.standard.set(
  Date().timeIntervalSince1970,
  forKey: <span class="cs">"recipes_last_sync"</span>
)`,
 conn:['recipes-api','mixlists-api','mybar-api','devices-api','profile-api','sqlite-cache','ios-app'],
 guide:`<div class="gs"><div class="gt">Force full resync</div><div class="gsteps"><div class="gstep"><span class="gsn">1</span><span class="gst">Clear UserDefaults timestamp key for the target resource</span></div><div class="gstep"><span class="gsn">2</span><span class="gst">Call <code>GET /cache/recipes</code> with no timestamp — returns full dataset</span></div><div class="gstep hl"><span class="gsn">3</span><span class="gst">SQLite replaced entirely — all existing rows overwritten</span></div></div></div>`},

{id:'chat-history',l:'Chat History DB',cat:'data',sz:4,rel:1,cl:'SQL',
 desc:'Bond AI conversation persistence. ACTIVE table is conversation_messages (role/content/conversation_id/user_id/created_at) — chat_history is legacy and no longer primary. conversation_messages uses session_id TEXT directly (no separate conversations table). chat_history_summary stores compressed session summaries injected as context on next session. chat_handler_ext.go exposes GET /chat/history and POST /chat/feedback. Indexed by user_id + session_id in PostgreSQL.',
 code:`<span class="cc">-- chat_history</span>
id         UUID PK
user_id    TEXT NOT NULL
session_id UUID NOT NULL
role       TEXT CHECK(IN ('user','assistant'))
content    TEXT
created_at TIMESTAMPTZ

<span class="cc">-- chat_history_summary</span>
session_id UUID PK
user_id    TEXT
summary    TEXT   <span class="cc">-- injected as context</span>
created_at TIMESTAMPTZ

<span class="cc">// Exposed via chat_handler_ext.go</span>
GET /api/v1/chat/history
POST /api/v1/chat/feedback`,
 conn:['bond-ai','chat-api','postgres','bond'],
 guide:`<div class="gs"><div class="gt">Retrieve conversation history</div><div class="gsteps"><div class="gstep"><span class="gsn">1</span><span class="gst">GET /api/v1/chat/history (JWT required)</span></div><div class="gstep"><span class="gsn">2</span><span class="gst">Returns from <code>conversation_messages</code> — not legacy <code>chat_history</code> table</span></div><div class="gstep warn"><span class="gsn">!</span><span class="gst">Filter by session_id to isolate a single conversation</span></div></div></div>`},

{id:'media-upload',l:'Media Upload (GCS)',cat:'backend',sz:4,rel:1,cl:'Go',
 desc:'GCS-backed media upload system. PUT /my/profile/picture handles multipart user avatar upload. Device docs also stored in GCS. Metadata tracked in media_storage table (bucket, path, content_type, size_bytes). GCP Storage Repository at repositories/gcp/storage_repository.go. Configurable via GOOGLE_STORAGE_BUCKET_NAME + GOOGLE_STORAGE_BASE_PATH. Returns CDN URL after upload.',
 code:`<span class="cc">// storage_repository.go</span>
<span class="ck">func</span> UploadMedia(ctx, bucket, path, reader) (url, err) {
  obj := client.Bucket(bucket).Object(path)
  wc  := obj.NewWriter(ctx)
  io.Copy(wc, reader)
  wc.Close()  <span class="cc">// returns CDN url</span>
}

<span class="cc">-- media_storage table</span>
id, user_id, bucket, path,
content_type, size_bytes, created_at

PUT /api/v1/my/profile/picture`,
 conn:['gcs','profile-api','devices-api','postgres'],
 guide:`<div class="gs"><div class="gt">Debug upload failure</div><div class="gsteps"><div class="gstep"><span class="gsn">1</span><span class="gst">Verify <code>GOOGLE_STORAGE_BUCKET_NAME</code> env var is set</span></div><div class="gstep warn"><span class="gsn">!</span><span class="gst"><code>GOOGLE_APPLICATION_CREDENTIALS_JSON</code> must be <code>data:application/json;base64,...</code> format</span></div><div class="gstep"><span class="gsn">3</span><span class="gst">Compress to &lt;2MB before upload — no server-side compression</span></div></div></div>`},

{id:'party-websocket',l:'Party WebSocket Hub',cat:'backend',sz:4,rel:1,cl:'Go',
 desc:'Real-time WebSocket for party mode. GET /api/v1/party/sessions/:id/ws upgrades connection. PartyHub manages rooms: BroadcastToSession (all participants), BroadcastToGuest (targeted), BroadcastToHost. Events: party state, shake challenge results, leaderboard deltas, guest join/leave. Accepts both RS256 JWT (hosts) and HS256 guest tokens. Global + city-based leaderboards.',
 code:`<span class="cc">// party_handler.go — PartyHub</span>
GET /api/v1/party/sessions/:id/ws

<span class="ck">type</span> PartyHub <span class="ck">struct</span> {
  sessions map[string]*PartySession
  mu       sync.RWMutex
}

hub.BroadcastToSession(sessionID, event)
hub.BroadcastToGuest(sessionID, guestID, event)
hub.BroadcastToHost(sessionID, event)

<span class="cc">// WS event types</span>
party_state_update | challenge_score

,{id:'request-cancellation-manager',l:'Request Cancellation',cat:'ios',sz:3,rel:.75,cl:'Swift',
 desc:'Thread-safe @unchecked Sendable singleton managing URLSessionDataTask lifecycles keyed by CancellationToken strings. NSLock-protected dictionary tracks active tasks per screen scope. Provides bulk cancel per token and marks cancelled tokens to suppress queued callbacks from completing out-of-order after navigation away.',
 code:`<span class="ck">final class</span> RequestCancellationManager: <span class="cm">@unchecked Sendable</span> {
  <span class="ck">static let</span> shared = RequestCancellationManager()
  <span class="ck">private let</span> lock = NSLock()
  <span class="ck">private var</span> activeTasks: [String: Set<WeakTaskWrapper>] = [:]
  <span class="ck">private var</span> cancelledTokens: Set<String> = []

  <span class="ck">func</span> register(_ task: URLSessionDataTask, for token: CancellationToken) {
    lock.lock(); <span class="ck">defer</span> { lock.unlock() }
    cancelledTokens.remove(token.identifier)
    <span class="ck">var</span> set = activeTasks[token.identifier] ?? []
    set = set.filter { $0.task?.state != .completed }
    set.insert(WeakTaskWrapper(task))
    activeTasks[token.identifier] = set
  }
  <span class="ck">func</span> cancelAll(for token: CancellationToken) {
    lock.lock(); <span class="ck">defer</span> { lock.unlock() }
    activeTasks[token.identifier]?.forEach { $0.task?.cancel() }
    cancelledTokens.insert(token.identifier)
  }
}`,
 conn:['ios-app','defteros','local-db','recipe-browse','barbot'],
 guide:`<div class="gs"><div class="gt">Cancel all requests when leaving a screen</div><div class="gsteps"><div class="gstep"><span class="gsn">1</span><span class="gst">Create a <code>CancellationToken</code> scoped to the ViewController (e.g. its class name as identifier)</span></div><div class="gstep"><span class="gsn">2</span><span class="gst">Register each URLSessionDataTask: <code>RequestCancellationManager.shared.register(task, for: token)</code></span></div><div class="gstep"><span class="gsn">3</span><span class="gst">Call <code>RequestCancellationManager.shared.cancelAll(for: token)</code> in <code>viewWillDisappear</code></span></div><div class="gstep hl"><span class="gsn">4</span><span class="gst">Check <code>isCancelled(token:)</code> in completion handlers to suppress stale UI updates after pop</span></div></div></div>`}

,{id:'ota-firmware-update',l:'OTA Firmware Update',cat:'android',sz:5,rel:.9,cl:'Kotlin',
 desc:'ForegroundService.kt manages OTA firmware flashing via chunked BLE data transfer. Splits firmware binary into MTU-sized blocks, prefixes data frames with 0xFB marker byte and sequence index, sends completion frame 0xFC with total size and position bytes. Runs as Android foreground service with persistent notification to survive app backgrounding during the flash process.',
 code:`<span class="ck">fun</span> sendData(context: Context, pos: Int) {
  <span class="ck">val</span> data = File(File(context.cacheDir, <span class="cs">"data"</span>), <span class="cs">"data\${pos}.bin"</span>).readBytes()
  <span class="ck">val</span> total = data.size / mtu
  <span class="ck">for</span> (x <span class="ck">in</span> <span class="cn">0</span> until total) {
    <span class="ck">val</span> arr = ByteArray(mtu + <span class="cn">2</span>)
    arr[<span class="cn">0</span>] = (<span class="cn">0xFB</span>).toByte()  <span class="cc">// data frame marker</span>
    arr[<span class="cn">1</span>] = x.toByte()
    <span class="ck">for</span> (y <span class="ck">in</span> <span class="cn">0</span> until mtu) arr[y+<span class="cn">2</span>] = data[(x*mtu)+y]
    sendData(arr)
  }
  <span class="cc">// completion frame: 0xFC + size + position</span>
  <span class="ck">val</span> done = byteArrayOfInts(<span class="cn">0xFC</span>,
    data.size/<span class="cn">256</span>, data.size%<span class="cn">256</span>, pos/<span class="cn">256</span>, pos%<span class="cn">256</span>)
  <span class="ck">val</span> pct = ((pos.toFloat() / parts) * <span class="cn">100</span>).toInt()
  transmitData(done, pct, context)
}`,
 conn:['android-ble-service','notification-channels','ble-hardware','ble-opcodes'],
 guide:`<div class="gs"><div class="gt">Trigger an OTA firmware update</div><div class="gsteps"><div class="gstep"><span class="gsn">1</span><span class="gst">Download firmware binary to <code>context.cacheDir/data/</code> before starting service</span></div><div class="gstep"><span class="gsn">2</span><span class="gst">Start via <code>startForegroundService(Intent(this, ForegroundService::class.java))</code> — required Android O+</span></div><div class="gstep"><span class="gsn">3</span><span class="gst">Monitor progress via <code>transmitData</code> callback — percentage is <code>pos/parts * 100</code></span></div><div class="gstep warn"><span class="gsn">!</span><span class="gst">Never cancel the foreground service mid-flash — partial firmware writes will brick the device</span></div></div></div>`}

        .also { it.enableLights(<span class="ck">true</span>); it.enableVibration(<span class="ck">true</span>) }

        .also { it.enableLights(<span class="ck">false</span>); it.setSound(<span class="ck">null</span>, <span class="ck">null</span>) }

,{id:'android-ble-ota-manager',l:'Android OTA Manager',cat:'android',sz:4,rel:.85,cl:'Kotlin',
 desc:'BLEManager.kt (standalone BluetoothGattCallback, does NOT extend nRF BleManager) handles OTA firmware delivery with MTU=512. Declares OTA service UUID fb1e4001 and TX/RX characteristics. Handles MTU request before each transmission, writes firmware chunks via writeCharacteristic, and reports progress percentage via callback. Coordinated by ForegroundService.',
 code:`<span class="ck">class</span> LEManager(context: Context) : BleManager<LeManagerCallbacks>(context) {
  <span class="ck">companion object</span> {
    <span class="ck">const val</span> MTU = <span class="cn">512</span>
    <span class="ck">val</span> OTA_SERVICE = UUID.fromString(<span class="cs">"fb1e4001-54ae-4a28-9f74-dfccb248601d"</span>)
    <span class="ck">val</span> OTA_TX_CHAR = UUID.fromString(<span class="cs">"fb1e4002-54ae-4a28-9f74-dfccb248601d"</span>)
    <span class="ck">val</span> OTA_RX_CHAR = UUID.fromString(<span class="cs">"fb1e4003-54ae-4a28-9f74-dfccb248601d"</span>)
  }
  <span class="ck">fun</span> transmitData(bytes: ByteArray, progress: Int, ctx: Context): Boolean {
    <span class="ck">return if</span> (isConnected && otaTxCharacteristic != <span class="ck">null</span>) {
      requestMtu(MTU).enqueue()
      writeCharacteristic(otaTxCharacteristic, bytes) != <span class="ck">null</span>
    } <span class="ck">else false</span>
  }
}`,
 conn:['ota-firmware-update','android-ble-gatt','ble-hardware','coaster-device-support','station-telemetry'],
 guide:`<div class="gs"><div class="gt">Initiate firmware update via LEManager</div><div class="gsteps"><div class="gstep"><span class="gsn">1</span><span class="gst">Connect LEManager to device and verify <code>isConnected && isReady</code> before starting</span></div><div class="gstep"><span class="gsn">2</span><span class="gst">Split firmware binary into chunks matching <code>MTU=512</code> in ForegroundService.sendData()</span></div><div class="gstep"><span class="gsn">3</span><span class="gst">Monitor <code>LeManagerCallbacks.onDataSent</code> for per-chunk acknowledgement and update progress UI</span></div><div class="gstep warn"><span class="gsn">!</span><span class="gst">MTU=512 is negotiated per-session — actual MTU may be lower. ForegroundService.sendData() uses <code>mtu</code> field, not hardcoded 512</span></div></div></div>`}

const CAT_COLORS = {
  ios:'var(--c-ios)',backend:'var(--c-backend)',data:'var(--c-data)',
  infra:'var(--c-infra)',ble:'var(--c-ble)'
};
const CAT_RAW_DARK={ios:'#4A9EE8',backend:'#F0B840',data:'#C46EC8',infra:'#3EC996',ble:'#3ECFCF',android:'#3DDC84'};
const CAT_RAW_LIGHT={ios:'#1a6eaa',backend:'#b07c10',data:'#8a3a90',infra:'#1a8c60',ble:'#1a8c8c',android:'#1a7a38'};
const CAT_RAW={...CAT_RAW_DARK};
const CAT_LABELS = {
  ios:'iOS App',backend:'Backend API',data:'Data & Models',
  infra:'Infrastructure',ble:'BLE / Hardware',android:'Android App'
};
const CAT_SHAPE = {ios:'hex',backend:'diamond',data:'hex',infra:'tri',ble:'diamond',android:'tri'};
const CAT_ORDER = ['ios','backend','data','infra','ble','android'];
const SHAPE_CHAR = {hex:'⬡',diamond:'◇',tri:'△'};

const GH = 'https://github.com/barsysindia/barsys-ai-app-ios/blob/main/';
let dark=true, filt='all', hov=null, sel=null;
let cam={x:0,y:0}, zoom=1, dragging=false;
let viewMode='graph';

const cv=document.getElementById('cv');
const cx=cv.getContext('2d');
let W,H,dpr;

function resize(){
  W=innerWidth; H=innerHeight-40; dpr=devicePixelRatio||1;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  const mc=document.getElementById('mmc');
  mc.width=140*dpr; mc.height=90*dpr;
  mc.style.width='140px'; mc.style.height='90px';
  mc.getContext('2d').setTransform(dpr,0,0,dpr,0,0);
}
resize(); addEventListener('resize',resize);

const nodes=[],edges=[],nodeMap={};
N.forEach((n,i)=>{
  const cats=[...new Set(N.map(x=>x.cat))];
  const catIdx=cats.indexOf(n.cat);
  const catNodes=N.filter(x=>x.cat===n.cat);
  const idxInCat=catNodes.indexOf(n);
  const catAngle=(catIdx/cats.length)*Math.PI*2-Math.PI/2;
  const spread=300+catNodes.length*20;
  const subAngle=catAngle+(idxInCat-catNodes.length/2)*0.25;
  const r=spread+idxInCat*30;
  const node={id:n.id,n:n,cat:n.cat,
    x:Math.cos(subAngle)*r+(Math.random()-0.5)*60,
    y:Math.sin(subAngle)*r+(Math.random()-0.5)*60,
    vx:0,vy:0,visible:true};
  nodes.push(node); nodeMap[n.id]=node;
});
N.forEach(n=>{
  if(!n.conn)return;
  n.conn.forEach(tid=>{
    if(nodeMap[tid]&&nodeMap[n.id]){
      const ex=edges.some(e=>(e.source.id===n.id&&e.target.id===tid)||(e.source.id===tid&&e.target.id===n.id));
      if(!ex)edges.push({source:nodeMap[n.id],target:nodeMap[tid]});
    }
  });
});
document.getElementById('st').textContent=nodes.length+' NODES / '+edges.length+' EDGES';

// Filter bar
const fb=document.getElementById('fb');
const cats=['all',...new Set(N.map(n=>n.cat))];
cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='fp'+(c==='all'?' on':'');
  b.textContent=c==='all'?'All':(CAT_LABELS[c]||c);
  b.onclick=()=>{
    filt=c;
    document.querySelectorAll('.fp').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    nodes.forEach(n=>n.visible=(c==='all'||n.cat===c));
    const ve=edges.filter(e=>e.source.visible&&e.target.visible);
    document.getElementById('st').textContent=nodes.filter(n=>n.visible).length+' NODES / '+ve.length+' EDGES';
  };
  fb.appendChild(b);
});

// View switching
function switchView(mode){
  viewMode=mode;
  const isDir=(mode==='directory');
  cv.style.display=isDir?'none':'';
  document.getElementById('mm').style.display=isDir?'none':'';
  document.getElementById('fb').style.display=isDir?'none':'';
  document.getElementById('zoom-ctrl').style.display=isDir?'none':'';
  document.getElementById('btn-reset').textContent=isDir?'RESET':'RESET';
  if(isDir){
    document.getElementById('dir-view').classList.add('on');
    buildDirectoryView();
  } else {
    document.getElementById('dir-view').classList.remove('on');
    document.getElementById('dir-search-input').value='';
  }
  document.getElementById('tab-graph').classList.toggle('active',!isDir);
  document.getElementById('tab-dir').classList.toggle('active',isDir);
}

function handleReset(){
  if(viewMode==='graph') autoFit();
  else { document.getElementById('dir-search-input').value=''; filterDirectory(''); }
}

// Build directory view
function buildDirectoryView(){
  // Nav sidebar
  const navCats=document.getElementById('dir-nav-cats');
  navCats.innerHTML='';
  CAT_ORDER.forEach(cat=>{
    const catNodes=N.filter(n=>n.cat===cat);
    const col=CAT_RAW[cat];
    const shape=CAT_SHAPE[cat];
    const div=document.createElement('div');
    div.className='dir-nav-item';
    div.id='nav-'+cat;
    div.innerHTML=
      '<span class="dir-nav-shape" style="color:'+col+'">'+SHAPE_CHAR[shape]+'</span>'+
      '<span class="dir-nav-label">'+CAT_LABELS[cat]+'</span>'+
      '<span class="dir-nav-count">'+catNodes.length+'</span>';
    div.onclick=()=>scrollToSection(cat);
    navCats.appendChild(div);
  });
  document.getElementById('dir-nav-total').textContent=N.length+' NODES · '+edges.length+' EDGES';

  // Main content
  const main=document.getElementById('dir-main');
  let html='';
  CAT_ORDER.forEach(cat=>{
    const catNodes=N.filter(n=>n.cat===cat);
    if(!catNodes.length)return;
    const col=CAT_RAW[cat];
    const shape=CAT_SHAPE[cat];
    html+='<div class="dir-section" id="dir-sec-'+cat+'">';
    html+='<div class="dir-sec-hdr">'+
      '<div class="dir-sec-bar" style="background:'+col+'"></div>'+
      '<span class="dir-sec-name">'+CAT_LABELS[cat].toUpperCase()+'</span>'+
      '<span class="dir-sec-count">'+catNodes.length+' NODES</span>'+
      '</div>';

    catNodes.forEach(n=>{
      const connEdges=edges.filter(e=>(e.source.id===n.id||e.target.id===n.id)&&e.source.visible&&e.target.visible);
      const connCount=connEdges.length;
      const connIds=n.conn||[];
      let tagHtml=connIds.slice(0,3).map(c=>{
        const t=N.find(x=>x&&x.id===c);
        return t?'<span class="dct" onclick="selectNode(\''+c+'\');event.stopPropagation()">'+t.l+'</span>':'';
      }).join('');
      if(connIds.length>3) tagHtml+='<span class="dct-more">+'+( connIds.length-3)+'</span>';

      const desc=n.desc?(n.desc.length>130?n.desc.substring(0,130)+'…':n.desc):'';
      const nodeCol=col;

      html+='<div class="dir-node" id="dnode-'+n.id+'" onclick="selectNode(\''+n.id+'\')">'+
        '<div class="dir-node-l">'+
          '<span class="dir-shape-icon" style="color:'+nodeCol+'">'+SHAPE_CHAR[shape]+'</span>'+
          '<div class="dir-node-meta">'+
            '<div class="dir-node-name" style="color:'+nodeCol+'">'+n.l+'</div>'+
            '<div class="dir-node-id">'+n.id+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="dir-node-desc">'+desc+'</div>'+
        '<div class="dir-node-r">'+
          '<div class="dir-conn-count">'+connCount+' connections</div>'+
          '<div class="dir-conn-tags">'+tagHtml+'</div>'+
        '</div>'+
      '</div>';
    });
    html+='</div>';
  });
  main.innerHTML=html;

  // Intersection observer to highlight active nav item
  const io=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const cat=e.target.id.replace('dir-sec-','');
      const navEl=document.getElementById('nav-'+cat);
      if(navEl) navEl.classList.toggle('active',e.isIntersecting);
    });
  },{root:main,threshold:0.1});
  document.querySelectorAll('.dir-section').forEach(s=>io.observe(s));
}

function scrollToSection(cat){
  const el=document.getElementById('dir-sec-'+cat);
  if(el) el.scrollIntoView({behavior:'smooth'});
}

function filterDirectory(q){
  const ql=q.toLowerCase().trim();
  let visCount=0;
  document.querySelectorAll('.dir-node').forEach(row=>{
    const id=row.id.replace('dnode-','');
    const n=N.find(x=>x&&x.id===id);
    if(!n){return;}
    const match=!ql||
      n.l.toLowerCase().includes(ql)||
      n.id.toLowerCase().includes(ql)||
      (n.desc&&n.desc.toLowerCase().includes(ql))||
      (n.cat&&CAT_LABELS[n.cat]&&CAT_LABELS[n.cat].toLowerCase().includes(ql));
    row.classList.toggle('hidden',!match);
    if(match) visCount++;
  });
  // Show/hide empty sections
  CAT_ORDER.forEach(cat=>{
    const sec=document.getElementById('dir-sec-'+cat);
    if(!sec)return;
    const anyVis=[...sec.querySelectorAll('.dir-node')].some(r=>!r.classList.contains('hidden'));
    sec.style.display=anyVis?'':'none';
  });
  document.getElementById('dir-nav-total').textContent=
    (ql?visCount+' results':N.length+' NODES')+' · '+edges.length+' EDGES';
}

// Physics
function tick(){
  const repulsion=-1600,linkDist=220,linkStr=0.003,damp=0.88,centerGrav=0.006;
  nodes.forEach(n=>{if(!n.visible)return;n.vx-=n.x*centerGrav;n.vy-=n.y*centerGrav;});
  const vis=nodes.filter(n=>n.visible);
  for(let i=0;i<vis.length;i++)for(let j=i+1;j<vis.length;j++){
    const a=vis[i],b=vis[j];
    let dx=b.x-a.x,dy=b.y-a.y;
    const d2=dx*dx+dy*dy,dist=Math.sqrt(d2)||1;
    const f=repulsion/d2,fx=(dx/dist)*f,fy=(dy/dist)*f;
    a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  }
  edges.forEach(e=>{
    if(!e.source.visible||!e.target.visible)return;
    let dx=e.target.x-e.source.x,dy=e.target.y-e.source.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1,f=(dist-linkDist)*linkStr;
    const fx=(dx/dist)*f,fy=(dy/dist)*f;
    e.source.vx+=fx;e.source.vy+=fy;e.target.vx-=fx;e.target.vy-=fy;
  });
  nodes.forEach(n=>{if(!n.visible)return;n.vx*=damp;n.vy*=damp;n.x+=n.vx;n.y+=n.vy;});
}

const _t=performance.now.bind(performance);
function hexPath(cx2,x,y,r){cx2.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6,px=x+r*Math.cos(a),py=y+r*Math.sin(a);i===0?cx2.moveTo(px,py):cx2.lineTo(px,py);}cx2.closePath();}
function diamondPath(cx2,x,y,r){cx2.beginPath();cx2.moveTo(x,y-r);cx2.lineTo(x+r*0.7,y);cx2.lineTo(x,y+r);cx2.lineTo(x-r*0.7,y);cx2.closePath();}
function triPath(cx2,x,y,r){cx2.beginPath();for(let i=0;i<3;i++){const a=Math.PI*2/3*i-Math.PI/2,px=x+r*Math.cos(a),py=y+r*Math.sin(a);i===0?cx2.moveTo(px,py):cx2.lineTo(px,py);}cx2.closePath();}

function draw(){
  for(let i=0;i<2;i++)tick();
  if(viewMode!=='graph'){requestAnimationFrame(draw);return;}
  const t=_t()*0.001;
  cx.clearRect(0,0,W,H);
  cx.save();cx.globalAlpha=dark?0.015:0.025;cx.strokeStyle=dark?'#c4a265':'#8a6a30';cx.lineWidth=0.5;
  const gs=80;
  for(let gx=-W/zoom;gx<W*2/zoom;gx+=gs){cx.beginPath();cx.moveTo(gx,-H/zoom);cx.lineTo(gx,H*2/zoom);cx.stroke();}
  for(let gy=-H/zoom;gy<H*2/zoom;gy+=gs){cx.beginPath();cx.moveTo(-W/zoom,gy);cx.lineTo(W*2/zoom,gy);cx.stroke();}
  cx.restore();
  cx.save();cx.translate(W/2+cam.x,H/2+cam.y);cx.scale(zoom,zoom);
  edges.forEach(e=>{
    if(!e.source.visible||!e.target.visible)return;
    const isSel=sel&&(e.source.id===sel||e.target.id===sel);
    const isHov=hov&&(e.source.id===hov||e.target.id===hov);
    const ecol=CAT_RAW[e.source.n.cat]||'#b09860';
    const ehr=parseInt(ecol.slice(1,3),16),ehg=parseInt(ecol.slice(3,5),16),ehb=parseInt(ecol.slice(5,7),16);
    if(isSel){cx.strokeStyle='rgba(196,162,101,0.55)';cx.lineWidth=1.0;cx.setLineDash([]);}
    else if(isHov){cx.strokeStyle='rgba(196,162,101,0.30)';cx.lineWidth=0.7;cx.setLineDash([]);}
    else{cx.strokeStyle=dark?'rgba('+ehr+','+ehg+','+ehb+',0.32)':'rgba('+ehr+','+ehg+','+ehb+',0.28)';cx.lineWidth=0.5;cx.setLineDash([]);}
    cx.beginPath();cx.moveTo(e.source.x,e.source.y);cx.lineTo(e.target.x,e.target.y);cx.stroke();
    if(!isSel&&!isHov){
      cx.fillStyle=dark?'rgba('+ehr+','+ehg+','+ehb+',0.15)':'rgba('+ehr+','+ehg+','+ehb+',0.12)';
      const mx2=(e.source.x+e.target.x)/2,my2=(e.source.y+e.target.y)/2;
      cx.beginPath();cx.arc(mx2,my2,0.8,0,Math.PI*2);cx.fill();
    }
    if(isSel){
      const prog=(t*0.5)%1;
      const px=e.source.x+(e.target.x-e.source.x)*prog,py=e.source.y+(e.target.y-e.source.y)*prog;
      cx.fillStyle='rgba(196,162,101,0.6)';cx.beginPath();cx.arc(px,py,1.5,0,Math.PI*2);cx.fill();
    }
  });
  cx.setLineDash([]);
  nodes.forEach(n=>{
    if(!n.visible)return;
    const isSel=n.id===sel,isHov=n.id===hov;
    const isConn=sel&&(edges.some(e=>(e.source.id===sel&&e.target.id===n.id)||(e.target.id===sel&&e.source.id===n.id)));
    const col=CAT_RAW[n.cat]||'#b09860';
    const hr=parseInt(col.slice(1,3),16),hg=parseInt(col.slice(3,5),16),hb=parseInt(col.slice(5,7),16);
    const shape=CAT_SHAPE[n.cat]||'hex';
    const r=isSel?14:isHov?12:isConn?10:8;
    if(isSel||isHov){
      const scanAlpha=isSel?0.3:0.15;
      cx.strokeStyle='rgba(196,162,101,'+scanAlpha+')';cx.lineWidth=0.5;
      const scanR=r+10,sweep=isSel?1.2:0.8,angle=t*2;
      cx.beginPath();cx.arc(n.x,n.y,scanR,angle,angle+sweep);cx.stroke();
      cx.beginPath();cx.arc(n.x,n.y,scanR,angle+Math.PI,angle+Math.PI+sweep);cx.stroke();
    }
    if(isSel){cx.strokeStyle='rgba(196,162,101,0.85)';cx.lineWidth=1.2;}
    else if(isHov){cx.strokeStyle='rgba(196,162,101,0.55)';cx.lineWidth=0.8;}
    else if(isConn){cx.strokeStyle='rgba('+hr+','+hg+','+hb+',0.5)';cx.lineWidth=0.7;}
    else{cx.strokeStyle='rgba('+hr+','+hg+','+hb+',0.35)';cx.lineWidth=0.5;}
    if(shape==='hex')hexPath(cx,n.x,n.y,r);
    else if(shape==='diamond')diamondPath(cx,n.x,n.y,r);
    else triPath(cx,n.x,n.y,r);
    cx.stroke();
    const fillAlpha=isSel?0.12:isHov?0.08:isConn?0.05:0.02;
    cx.fillStyle='rgba('+hr+','+hg+','+hb+','+fillAlpha+')';cx.fill();
    const dotAlpha=isSel?1:isHov?0.9:isConn?0.7:0.5;
    cx.fillStyle='rgba('+hr+','+hg+','+hb+','+dotAlpha+')';
    cx.beginPath();cx.arc(n.x,n.y,isSel?2:1.5,0,Math.PI*2);cx.fill();
    if((isSel||isHov)&&shape==='hex'){
      cx.strokeStyle='rgba(196,162,101,'+(isSel?0.4:0.2)+')';cx.lineWidth=0.5;
      for(let i=0;i<6;i++){
        const a=Math.PI/3*i-Math.PI/6;
        const ox2=n.x+(r+4)*Math.cos(a),oy2=n.y+(r+4)*Math.sin(a);
        const ix=n.x+(r+1)*Math.cos(a),iy=n.y+(r+1)*Math.sin(a);
        cx.beginPath();cx.moveTo(ix,iy);cx.lineTo(ox2,oy2);cx.stroke();
      }
    }
    const labelAlpha=isSel?1:isHov?1:isConn?0.95:0.85;
    cx.fillStyle=isSel||isHov?'rgba(196,162,101,'+labelAlpha+')':dark?'rgba(212,200,176,'+labelAlpha+')':'rgba(42,37,32,'+labelAlpha+')';
    cx.font="300 10px 'Plus Jakarta Sans'";cx.textAlign='center';
    cx.fillText(n.n.l.toUpperCase(),n.x,n.y+r+16);
    if(isSel||isHov){
      const cc=edges.filter(e=>(e.source.id===n.id||e.target.id===n.id)&&e.source.visible&&e.target.visible).length;
      cx.font='300 7px JetBrains Mono';cx.fillStyle='rgba(196,162,101,0.8)';
      cx.fillText(cc+'',n.x,n.y+r+25);
    }
  });
  cx.restore();drawMinimap();requestAnimationFrame(draw);
}

function drawMinimap(){
  const mc=document.getElementById('mmc'),mx=mc.getContext('2d');
  mx.clearRect(0,0,140,90);
  const vis=nodes.filter(n=>n.visible);if(!vis.length)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  vis.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x);maxY=Math.max(maxY,n.y);});
  const pad=50;minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const sc=Math.min(140/(maxX-minX),90/(maxY-minY));
  mx.strokeStyle=dark?'rgba(196,162,101,0.12)':'rgba(120,90,40,0.10)';mx.lineWidth=0.5;
  edges.forEach(e=>{if(!e.source.visible||!e.target.visible)return;mx.beginPath();mx.moveTo((e.source.x-minX)*sc,(e.source.y-minY)*sc);mx.lineTo((e.target.x-minX)*sc,(e.target.y-minY)*sc);mx.stroke();});
  vis.forEach(n=>{
    const col=CAT_RAW[n.cat]||'#b09860';
    const hr=parseInt(col.slice(1,3),16),hg=parseInt(col.slice(3,5),16),hb=parseInt(col.slice(5,7),16);
    mx.strokeStyle='rgba('+hr+','+hg+','+hb+',0.6)';mx.lineWidth=0.5;
    hexPath(mx,(n.x-minX)*sc,(n.y-minY)*sc,2.5);mx.stroke();
  });
  const vl=-cam.x/zoom-W/(2*zoom),vt=-cam.y/zoom-H/(2*zoom),vw=W/zoom,vh=H/zoom;
  mx.strokeStyle='rgba(196,162,101,0.3)';mx.lineWidth=0.5;
  mx.strokeRect((vl-minX)*sc,(vt-minY)*sc,vw*sc,vh*sc);
}

function screenToGraph(ex,ey){return{x:(ex-W/2-cam.x)/zoom,y:(ey-40-H/2-cam.y)/zoom};}
function findNode(ex,ey){
  const p=screenToGraph(ex,ey);let best=null,bestD=30;
  nodes.forEach(n=>{if(!n.visible)return;const dx=n.x-p.x,dy=n.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<bestD){bestD=d;best=n;}});
  return best;
}

cv.addEventListener('mousemove',e=>{
  const tip=document.getElementById('tip');
  if(dragging){cam.x+=e.movementX;cam.y+=e.movementY;tip.classList.remove('on');return;}
  const found=findNode(e.clientX,e.clientY-40);
  if(found){
    hov=found.id;cv.style.cursor='pointer';tip.classList.add('on');
    document.getElementById('tipC').textContent=CAT_LABELS[found.cat]||found.cat;
    document.getElementById('tipT').textContent=found.n.l;
    const cc=edges.filter(ed=>(ed.source.id===found.id||ed.target.id===found.id)&&ed.source.visible&&ed.target.visible).length;
    document.getElementById('tipN').textContent=cc+' connections';
    tip.style.left=Math.min(e.clientX+16,W-200)+'px';tip.style.top=(e.clientY+16)+'px';
  }else{hov=null;cv.style.cursor='crosshair';tip.classList.remove('on');}
});
cv.addEventListener('mousedown',()=>{dragging=true;cv.style.cursor='grabbing';});
addEventListener('mouseup',()=>{dragging=false;cv.style.cursor=hov?'pointer':'crosshair';});
cv.addEventListener('click',e=>{
  const found=findNode(e.clientX,e.clientY-40);
  if(found){sel=found.id;openPanel(found.n);}else{sel=null;closePanel();}
});
cv.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY>0?0.9:1.1;zoom=Math.max(0.2,Math.min(5,zoom*f));},{passive:false});
function zoomTo(z){zoom=Math.max(0.2,Math.min(5,z));}

function openPanel(n){
  document.getElementById('dp').classList.add('on');
  const col=CAT_RAW[n.cat]||'#b09860';
  document.getElementById('dph').innerHTML=
    '<div class="dp-cat"><span class="dp-dot" style="background:'+col+'"></span>'+(CAT_LABELS[n.cat]||n.cat)+'</div>'+
    '<div class="dp-title">'+n.l+'</div>'+
    '<div class="dp-id">'+n.id+'</div>'+
    (n.gh?'<a class="dp-gh" href="'+GH+n.gh+'" target="_blank">GitHub</a>':'');
  const dtabs=document.getElementById('dtabs');
  const tabs=['Overview'];if(n.code)tabs.push('Code');if(n.guide)tabs.push('Guide');
  dtabs.innerHTML=tabs.map((t,i)=>'<button class="tab'+(i===0?' on':'')+'" data-tab="'+t.toLowerCase()+'">'+t+'</button>').join('');
  dtabs.querySelectorAll('.tab').forEach(tb=>{tb.onclick=()=>{dtabs.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));tb.classList.add('on');showTab(n,tb.dataset.tab);};});
  showTab(n,'overview');
}
function showTab(n,tab){
  const dtb=document.getElementById('dtb');
  if(!dtb||!n)return;
  try{
    if(tab==='overview'){
      let h='';
      if(n.desc)h+='<div class="os"><div class="ol">Description</div><div class="otx">'+n.desc+'</div></div>';
      if(n.conn&&n.conn.length){
        h+='<div class="os"><div class="ol">Connections</div><div class="conn-list">';
        n.conn.forEach(c=>{const t=N.find(x=>x&&x.id===c);if(t)h+='<span class="conn-tag" onclick="selectNode(\''+c+'\')">'+t.l+'</span>';});
        h+='</div></div>';
      }
      if(!h)h='<div class="otx" style="padding:20px;color:var(--t3)">No description available</div>';
      dtb.innerHTML=h;
    } else if(tab==='code'&&n.code){
      dtb.innerHTML='<div class="cblk"><div class="cbh"><span class="cbf">'+(n.cf||n.id)+'</span><span class="cbl">'+(n.cl||'Swift')+'</span></div><div class="cbd">'+n.code+'</div></div>';
    } else if(tab==='guide'&&n.guide){
      dtb.innerHTML=n.guide;
    } else {
      dtb.innerHTML='<div class="otx" style="padding:20px;color:var(--t3)">No content available</div>';
    }
  }catch(e){
    dtb.innerHTML='<div class="otx" style="padding:20px;color:var(--t3)">Error loading content</div>';
  }
}
function selectNode(id){
  sel=id;const n=N.find(x=>x&&x.id===id);if(n)openPanel(n);
  if(viewMode==='graph'){const node=nodeMap[id];if(node){cam.x=-node.x*zoom;cam.y=-node.y*zoom;}}
}
function closePanel(){document.getElementById('dp').classList.remove('on');sel=null;}

const HIST_KEY='kg_sh_v1';
function loadHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch(e){return[];}}
function saveToHistory(q,type){
  const h=loadHistory().filter(x=>x.q!==q);
  h.unshift({q,type,ts:Date.now()});
  localStorage.setItem(HIST_KEY,JSON.stringify(h.slice(0,10)));
}
function clearHistory(){localStorage.removeItem(HIST_KEY);showEmptyState();}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showEmptyState(){
  const srl=document.getElementById('srl');
  const hist=loadHistory();
  let out='';
  if(hist.length){
    out+='<div class="s-history-hdr">Recent<span class="s-history-clr" onclick="clearHistory()">Clear all</span></div>';
    out+=hist.map(h=>'<div class="s-hist-item" onclick="rerunSearch(\''+h.q.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'
      +'<span class="s-hist-icon">'+(h.type==='ai'?'✦':'◎')+'</span>'
      +'<span class="s-hist-q">'+escHtml(h.q)+'</span>'
      +'<span class="s-hist-type">'+h.type+'</span>'
      +'</div>').join('');
  }
  const suggHdr=hist.length?'':'<div class="s-sugg-hdr">Try asking</div>';
  out+='<div style="margin-top:'+(hist.length?'8':'2')+'px">'+suggHdr
    +SUGGESTIONS.map(s=>'<div class="s-sugg" onclick="rerunSearch(\''+s.replace(/'/g,"\\'")+'\')">'
      +'<span class="s-sugg-arrow">→</span>'+escHtml(s)+'</div>').join('')
    +'</div>';
  srl.innerHTML=out;
}

function rerunSearch(q){
  const inp=document.getElementById('si');
  inp.value=q;updateClearBtn();fireAI(q);
}
function clearSearch(){
  const inp=document.getElementById('si');
  inp.value='';inp.focus();updateClearBtn();
  closeSearchDetail();
  showEmptyState();
}
function handleAIBtn(){
  if(!KG_API_KEY){showKeyPrompt();return;}
  fireAI(document.getElementById('si').value);
}
function updateClearBtn(){
  const v=document.getElementById('si').value;
  document.getElementById('s-clear').style.display=v?'block':'none';
  syncAIBtn();
}
function syncAIBtn(){
  const btn=document.getElementById('s-ai-btn');
  if(!btn)return;
  if(!KG_API_KEY){
    btn.textContent='SET UP AI';btn.disabled=false;btn.classList.add('s-ai-setup');
  } else {
    btn.textContent='ASK AI';btn.classList.remove('s-ai-setup');
    btn.disabled=!(document.getElementById('si').value||'').trim();
  }
}

function toggleSearch(){
  clearTimeout(_searchTimer);_searchReqId++;
  const sov=document.getElementById('sov');
  const wasOn=sov.classList.contains('on');
  sov.classList.toggle('on');
  if(!wasOn){
    const inp=document.getElementById('si');
    inp.value='';updateClearBtn();syncAIBtn();inp.focus();
    closeSearchDetail();showEmptyState();
  }
}

const STOP=new Set(['the','is','are','was','were','how','what','where','which','why','does','do','did','and','or','for','with','from','into','by','of','to','in','it','a','an','that','this','there','these','those','be','been','being','have','has','had','will','would','could','should','may','might','can','not','no','show','me','my','about','using','use','used','when','then','also','all','any','each','get','got','set','let','new','old','its','our','their','them','they','we','you','i','am','at','on','as','if','but','so','yet','nor','up','out','off','way','make','made','just','tell','want','need']);

function stripHtml(s){return (s||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();}

function isQuestion(q){
  return /^(how|what|where|which|why|show|explain|tell|find|who|does|do|when|can|is|are)\b/i.test(q.trim())||q.includes('?')||(q.length>20&&/\s/.test(q));
}

function scoreAndRank(words){
  const scores={};
  N.forEach(n=>{scores[n.id]=0;});
  words.forEach(word=>{
    const wl=word.toLowerCase();
    Object.entries(TOPICS).forEach(([topic,ids])=>{
      if(topic===wl||topic.startsWith(wl)||wl.startsWith(topic)){
        ids.forEach(id=>{if(scores[id]!==undefined)scores[id]+=3;});
      }
    });
    N.forEach(n=>{
      const lbl=n.l.toLowerCase(),nid=n.id.toLowerCase();
      const desc=stripHtml(n.desc||'').toLowerCase();
      if(lbl===wl||nid===wl)scores[n.id]+=5;
      else if(lbl.includes(wl)||nid.includes(wl))scores[n.id]+=3;
      else if(desc.includes(wl))scores[n.id]+=1;
    });
  });
  const seeded=N.filter(n=>scores[n.id]>=3).map(n=>n.id);
  seeded.forEach(id=>{
    const nd=N.find(x=>x&&x.id===id);
    if(nd&&nd.conn)nd.conn.forEach(cid=>{if(scores[cid]!==undefined)scores[cid]+=0.5;});
  });
  return N.filter(n=>scores[n.id]>0)
    .sort((a,b)=>scores[b.id]-scores[a.id])
    .map(n=>({...n,_score:scores[n.id]}));
}

async function callClaudeSearch(q){
  // Pre-rank nodes by keyword relevance so most relevant get full descriptions
  const qwords=q.toLowerCase().split(/[\s\W]+/).filter(w=>w.length>2&&!STOP.has(w));
  const scored=N.filter(n=>n&&n.id&&n.l).map(n=>{
    const text=(n.l+' '+n.id+' '+(n.desc||'')+' '+(n.conn||[]).join(' ')).toLowerCase();
    let sc=0;for(const w of qwords){if(text.includes(w))sc++;}
    return{n,sc};
  }).sort((a,b)=>b.sc-a.sc);

  const ctx=scored.map(({n,sc},i)=>{
    const conns=(n.conn||[]).map(id=>{const m=N.find(x=>x&&x.id===id);return m?m.l:id;}).join(', ');
    // Top relevant nodes: full desc (600 chars); lower relevance: brief (80 chars)
    const descLen=(sc>0||i<15)?600:80;
    const desc=stripHtml(n.desc||'').slice(0,descLen);
    return '['+n.id+'] '+n.l+' ('+n.cat+')\nDesc: '+desc+'\nConnects to: '+(conns||'none');
  }).join('\n\n---\n');

  const system=`You are the expert system architect for the Barsys AI platform. You have a complete 130-node knowledge graph covering: iOS app (UIKit/MVVM), Android app (Kotlin), Defteros Go backend (Echo v4), PostgreSQL schema (32 migrations), Bond AI service, BLE hardware protocol, and infrastructure (GCP, Railway, Pub/Sub).

When the user asks how something works, trace a flow, or asks a process question, structure your answer EXACTLY like this:

FLOW:
1. [node-id] → What happens here (reference the actual class name, endpoint path, or table name)
2. [node-id] → Next step in the sequence
3. [node-id] → Continue until flow is complete
(use 4–12 steps — enough to fully trace the path through the system)

SUMMARY:
2–3 sentences explaining the end-to-end behavior. Reference specific class names, URLs, and table names found in the node data.

KEY NODES:
• [node-id] NodeName: one sentence on its specific role
• [node-id] NodeName: one sentence
(list every node referenced in FLOW plus any critical supporting nodes)

For simple factual questions that are NOT about a flow or process, skip FLOW and just return SUMMARY then KEY NODES.

CRITICAL RULES:
- ALWAYS wrap every node ID in square brackets: [node-id] — the UI renders these as clickable links
- Use actual class names, endpoint URLs, table names from the node descriptions — never paraphrase
- Never invent nodes or facts not in the knowledge graph
- The node ID is the identifier inside the first [] in each graph entry`;

  const headers={'Content-Type':'application/json'};
  if(KG_API_KEY&&KG_API_KEY!=='__server__')headers['X-Api-Key']=KG_API_KEY;
  const resp=await fetch('/anthropic',{
    method:'POST',
    headers:headers,
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:1600,
      system:system,
      messages:[{role:'user',content:'KNOWLEDGE GRAPH:\n'+ctx+'\n\nQUESTION: '+q}]
    })
  });

  if(!resp.ok){
    const err=await resp.json().catch(()=>({error:{message:'HTTP '+resp.status}}));
    if(resp.status===401&&KG_API_KEY!=='__server__'){KG_API_KEY='';sessionStorage.removeItem('kg_api_key');updateKeyBadge();}
    throw new Error((err.error&&err.error.message)||'API error '+resp.status);
  }
  const data=await resp.json();
  return data.content[0].text;
}

function nodeColor(n){return (n&&n.cat&&CAT_RAW[n.cat])||'#888';}

function getExcerpt(n,words){
  const desc=stripHtml((n&&n.desc)||'');
  if(!desc)return '';
  for(const w of (words||[])){
    const idx=desc.toLowerCase().indexOf(w);
    if(idx>=0){
      const s=Math.max(0,idx-30),e=Math.min(desc.length,idx+120);
      return (s>0?'\u2026':'')+desc.slice(s,e)+(e<desc.length?'\u2026':'');
    }
  }
  return desc.slice(0,130)+(desc.length>130?'\u2026':'');
}

function renderAIAnswer(text,words,srl){
  try{
    // Extract all [node-id] refs
    const refIds=[...new Set([...text.matchAll(/\[([a-z0-9][a-z0-9-]+)\]/g)].map(m=>m[1]))];
    const refNodes=refIds.map(id=>N.find(n=>n&&n.id===id)).filter(n=>n&&n.id&&n.l);

    function fmtRefs(s){
      return s
        .replace(/\[([a-z0-9][a-z0-9-]+)\]/g,(match,id)=>{
          const node=N.find(n=>n&&n.id===id);
          if(!node||!node.l)return '<code>'+id+'</code>';
          const col=nodeColor(node);
          return '<span class="kg-node-ref" onclick="openSearchDetail(\''+id+'\')" style="color:'+col+'" title="'+node.l+'">'+node.l+'</span>';
        })
        .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
    }

    // Parse structured sections
    const flowM=text.match(/FLOW:\s*([\s\S]*?)(?=SUMMARY:|KEY NODES:|$)/i);
    const summM=text.match(/SUMMARY:\s*([\s\S]*?)(?=KEY NODES:|FLOW:|$)/i);
    const hasStructure=!!(flowM||summM);

    let out='<div class="qa-answer"><div class="qa-alabel">AI Answer</div>';

    if(hasStructure){
      // Render FLOW as numbered steps
      if(flowM){
        const steps=flowM[1].trim().split(/\n/).map(l=>l.trim()).filter(l=>/^\d+\./.test(l));
        if(steps.length){
          out+='<div class="qa-flow"><div class="qa-flow-label">System Flow</div><div class="qa-flow-steps">';
          steps.forEach((step,i)=>{
            const content=step.replace(/^\d+\.\s*/,'');
            out+='<div class="qa-step">'
              +'<div class="qa-step-num">'+(i+1)+'</div>'
              +'<div class="qa-step-content">'+fmtRefs(content)+'</div>'
              +'</div>';
          });
          out+='</div></div>';
        }
      }
      // Render SUMMARY
      if(summM){
        const summText=summM[1].trim().replace(/\n\n+/g,'<br><br>').replace(/\n/g,' ');
        out+='<div class="qa-summary">'+fmtRefs(summText)+'</div>';
      }
    } else {
      // Fallback: unstructured prose
      const formatted=text
        .replace(/\[([a-z0-9][a-z0-9-]+)\]/g,(match,id)=>{
          const node=N.find(n=>n&&n.id===id);
          if(!node||!node.l)return '<code>'+id+'</code>';
          const col=nodeColor(node);
          return '<span class="kg-node-ref" onclick="openSearchDetail(\''+id+'\')" style="color:'+col+'">'+node.l+'</span>';
        })
        .replace(/^#{1,3}\s*/gm,'')
        .replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')
        .replace(/^[\-•]\s*/gm,'<br>&bull; ')
        .replace(/^\d+\.\s*/gm,(m,o)=>o===0?m:'<br>'+m)
        .replace(/\n\n+/g,'<br><br>')
        .replace(/\n/g,' ');
      out+='<div class="qa-atext">'+formatted+'</div>';
    }

    out+='</div>';

    // Node cards for all referenced nodes
    if(refNodes.length){
      out+='<div class="qa-nlabel">Referenced nodes ('+refNodes.length+')</div>';
      out+=refNodes.map(n=>{
        if(!n||!n.id)return'';
        const col=nodeColor(n);
        const excerpt=getExcerpt(n,words);
        const conns=getConnLabels(n,refNodes);
        const connHtml=conns.length
          ?'<div class="sr-conn">'+conns.map(c=>'<span class="sr-conn-dot"></span>'+c).join(' ')+'</div>'
          :'';
        return'<div class="sr" data-id="'+n.id+'" onclick="openSearchDetail(\''+n.id+'\')" title="Click to view node">'
          +'<div class="sr-top">'
          +'<div class="sr-dot" style="background:'+col+'"></div>'
          +'<div class="sr-name">'+n.l+'</div>'
          +'<div class="sr-cat" style="border-color:'+col+'40;color:'+col+'">'+(CAT_LABELS[n.cat]||n.cat)+'</div>'
          +'</div>'
          +(excerpt?'<div class="sr-excerpt">'+excerpt+'</div>':'')
          +connHtml
          +'</div>';
      }).filter(Boolean).join('');
    }
    srl.innerHTML=out;
  }catch(err){
    srl.innerHTML='<div class="qa-answer">'
      +'<div class="qa-alabel" style="color:var(--ac)">Answer</div>'
      +'<div class="qa-atext">'+text.replace(/\[([^\]]+)\]/g,'<b>$1</b>').replace(/\n/g,'<br>')+'</div>'
      +'</div>';
  }
}

function getConnLabels(n,top){
  if(!n||!Array.isArray(top))return[];
  const topIds=new Set(top.filter(x=>x&&x.id).map(x=>x.id));
  return (n.conn||[]).filter(id=>topIds.has(id)).map(id=>{
    const m=N.find(x=>x&&x.id===id);return m?m.l:id;
  }).filter(Boolean).slice(0,3);
}

// ── fireAI: immediately call Claude with the current query ──────────
async function fireAI(q){
  q=(q||'').trim();if(!q)return;
  clearTimeout(_searchTimer);_searchReqId++;
  const reqId=_searchReqId;
  const srl=document.getElementById('srl');
  closeSearchDetail();
  saveToHistory(q,'ai');

  if(!KG_API_KEY){
    srl.innerHTML='<div class="qa-answer">'
      +'<div class="qa-alabel">API Key Required</div>'
      +'<div class="qa-atext" style="margin-bottom:2px">Add your Anthropic API key to get AI-powered answers.</div>'
      +'<div class="kg-key-wrap">'
      +'<input id="kg-key-inp" class="kg-key-inp" type="password" placeholder="sk-ant-api03-..." onkeydown="if(event.key===\'Enter\')saveKey()">'
      +'<button class="kg-key-btn" onclick="saveKey()">CONNECT</button>'
      +'</div></div>';
    setTimeout(()=>{const i=document.getElementById('kg-key-inp');if(i)i.focus();},50);
    return;
  }

  srl.innerHTML='<div class="qa-answer">'
    +'<div class="qa-alabel">AI Answer</div>'
    +'<div class="qa-atext">Searching knowledge graph<span class="kg-dots"><span>.</span><span>.</span><span>.</span></span></div>'
    +'</div>';
  try{
    const answer=await callClaudeSearch(q);
    if(reqId!==_searchReqId)return;
    const words=q.toLowerCase().split(/[\s\W]+/).filter(w=>w.length>2&&!STOP.has(w));
    renderAIAnswer(answer,words,srl);
  }catch(e){
    if(reqId!==_searchReqId)return;
    srl.innerHTML='<div class="qa-answer">'
      +'<div class="qa-alabel" style="color:#c46">Error</div>'
      +'<div class="qa-atext" style="color:#c46">'+e.message+'</div>'
      +(e.message.includes('401')||e.message.includes('invalid')
        ?'<div style="margin-top:8px"><button class="kg-key-btn" onclick="showKeyPrompt()">RE-ENTER KEY</button></div>':'')
      +'</div>';
  }
}

// ── doSearch: instant node filter only (no AI, no debounce) ─────────
function doSearch(q){
  const srl=document.getElementById('srl');
  updateClearBtn();
  if(!q.trim()){showEmptyState();return;}

  const words=q.toLowerCase().split(/[\s\W]+/).filter(w=>w.length>2&&!STOP.has(w));
  const ql=q.toLowerCase();
  const ranked=scoreAndRank(words);
  const matches=ranked.length?ranked:N.filter(n=>
    n.l.toLowerCase().includes(ql)||n.id.toLowerCase().includes(ql)||(n.desc&&stripHtml(n.desc).toLowerCase().includes(ql))
  );

  if(!matches.length){
    srl.innerHTML='<div class="s-no-match">No nodes match "<b>'+escHtml(q)+'</b>"<br><span style="opacity:.6;font-size:10px">Press ↵ or click ASK AI for an AI answer</span></div>';
    return;
  }
  saveToHistory(q,'node');
  srl.innerHTML=matches.slice(0,12).map(n=>{
    const excerpt=getExcerpt(n,words.length?words:[ql]);
    return '<div class="sr" data-id="'+n.id+'" onclick="openSearchDetail(\''+n.id+'\')">'
      +'<div class="sr-top">'
      +'<div class="sr-dot" style="background:'+nodeColor(n)+'"></div>'
      +'<div class="sr-name">'+n.l+'</div>'
      +'<div class="sr-cat" style="border-color:'+nodeColor(n)+'30;color:'+nodeColor(n)+'">'+(CAT_LABELS[n.cat]||n.cat)+'</div>'
      +'</div>'
      +'<div class="sr-excerpt">'+excerpt+'</div>'
      +'</div>';
  }).join('');
}
